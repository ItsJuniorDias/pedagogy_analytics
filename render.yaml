# Deploy 1-clique no Render (New + → Blueprint → aponte pra este repo).
# Cria o web service + um Postgres grátis e liga o DATABASE_URL sozinho.
services:
  - type: web
    name: pedagogy-analytics
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        generateValue: true          # o Render gera um token forte
      - key: RATE_LIMIT_PER_MIN
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: pedagogy-analytics-db
          property: connectionString
      # ---- Meta Conversions API (CAPI) ----
      - key: META_DATASET_ID
        value: "967920369353096"   # ID do pixel (Kid's learning Book app)
      - key: META_API_VERSION
        value: "v25.0"
      - key: META_CAPI_TOKEN
        sync: false                # cole o System User token no painel do Render
      - key: META_TEST_EVENT_CODE
        sync: false                # opcional; só durante testes, depois remova

databases:
  - name: pedagogy-analytics-db
    plan: free
